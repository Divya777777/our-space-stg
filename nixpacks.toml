[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

[phases.install]
cmds = ["pwd", "ls -la", "find . -name 'server.js' -type f", "cd backend && npm install --production=false"]

[phases.build]
cmds = ["cd backend && npx prisma generate"]

[start]
cmd = "pwd && ls -la && find . -name 'server.js' -type f && cd backend && npx prisma migrate deploy && node server.js"
